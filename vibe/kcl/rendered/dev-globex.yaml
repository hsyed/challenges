apiVersion: v1
kind: Namespace
metadata:
  name: globex-dev
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
  namespace: globex-dev
spec:
  hard:
    requests.cpu: '4'
    requests.memory: '8Gi'
    limits.cpu: '8'
    limits.memory: '16Gi'
    pods: '100'
    services: '20'
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-default-limits
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
  namespace: globex-dev
spec:
  limits:
  - type: Container
    default:
      cpu: '500m'
      memory: '512Mi'
    defaultRequest:
      cpu: '200m'
      memory: '256Mi'
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-default-deny
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
  namespace: globex-dev
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-system
  egress:
  - to:
    - namespaceSelector: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-api-sa
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: analytics-api
  namespace: globex-dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-api-config
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: analytics-api
  namespace: globex-dev
data:
  TENANT: globex
  ENVIRONMENT: dev
  APP_NAME: analytics-api
  LOG_LEVEL: debug
  CACHE_MODE: disabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-api
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: analytics-api
  namespace: globex-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics-api
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kcl
        platform.example.com/tenant: globex
        platform.example.com/environment: dev
        platform.example.com/owner: analytics-team
        platform.example.com/cost-center: cc-2040
        app.kubernetes.io/name: analytics-api
    spec:
      serviceAccountName: analytics-api-sa
      containers:
      - name: analytics-api
        image: ghcr.io/example/analytics-api:3.2.0
        ports:
        - containerPort: 8090
        env:
        - name: TENANT
          value: globex
        - name: ENVIRONMENT
          value: dev
        - name: APP_NAME
          value: analytics-api
        - name: LOG_LEVEL
          value: debug
        - name: CACHE_MODE
          value: disabled
        resources:
          requests:
            cpu: '200m'
            memory: '256Mi'
          limits:
            cpu: '500m'
            memory: '512Mi'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-api
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: analytics-api
  namespace: globex-dev
spec:
  selector:
    app.kubernetes.io/name: analytics-api
  ports:
  - port: 80
    targetPort: 8090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: analytics-api-ingress
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: analytics-api
  namespace: globex-dev
spec:
  ingressClassName: nginx
  rules:
  - host: analytics.dev.globex.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: analytics-api
            port:
              number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: analytics-api-pdb
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: dev
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: analytics-api
  namespace: globex-dev
spec:
  minAvailable: '50%'
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics-api
---
