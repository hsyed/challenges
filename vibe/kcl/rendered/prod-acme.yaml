apiVersion: v1
kind: Namespace
metadata:
  name: acme-prod
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
  namespace: acme-prod
spec:
  hard:
    requests.cpu: '24'
    requests.memory: '48Gi'
    limits.cpu: '40'
    limits.memory: '80Gi'
    pods: '100'
    services: '20'
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-default-limits
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
  namespace: acme-prod
spec:
  limits:
  - type: Container
    default:
      cpu: '1000m'
      memory: '1Gi'
    defaultRequest:
      cpu: '500m'
      memory: '512Mi'
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-default-deny
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
  namespace: acme-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-system
  egress:
  - to:
    - namespaceSelector: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: billing-api-sa
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-api
  namespace: acme-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-api-config
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-api
  namespace: acme-prod
data:
  TENANT: acme
  ENVIRONMENT: prod
  APP_NAME: billing-api
  LOG_LEVEL: info
  FEATURE_FLAG_NEW_CHECKOUT: 'false'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-api
  namespace: acme-prod
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-api
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kcl
        platform.example.com/tenant: acme
        platform.example.com/environment: prod
        platform.example.com/owner: payments-team
        platform.example.com/cost-center: cc-1001
        app.kubernetes.io/name: billing-api
    spec:
      serviceAccountName: billing-api-sa
      containers:
      - name: billing-api
        image: ghcr.io/example/billing-api:1.4.2
        ports:
        - containerPort: 8080
        env:
        - name: TENANT
          value: acme
        - name: ENVIRONMENT
          value: prod
        - name: APP_NAME
          value: billing-api
        - name: LOG_LEVEL
          value: info
        - name: FEATURE_FLAG_NEW_CHECKOUT
          value: 'false'
        resources:
          requests:
            cpu: '1000m'
            memory: '1Gi'
          limits:
            cpu: '2000m'
            memory: '2Gi'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: billing-api
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-api
  namespace: acme-prod
spec:
  selector:
    app.kubernetes.io/name: billing-api
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billing-api-ingress
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-api
  namespace: acme-prod
spec:
  ingressClassName: nginx
  rules:
  - host: billing.acme.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: billing-api
            port:
              number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: billing-api-pdb
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-api
  namespace: acme-prod
spec:
  minAvailable: '67%'
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: billing-worker-sa
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-worker
  namespace: acme-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-worker-config
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-worker
  namespace: acme-prod
data:
  TENANT: acme
  ENVIRONMENT: prod
  APP_NAME: billing-worker
  QUEUE_NAME: billing-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-worker
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-worker
  namespace: acme-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kcl
        platform.example.com/tenant: acme
        platform.example.com/environment: prod
        platform.example.com/owner: payments-team
        platform.example.com/cost-center: cc-1001
        app.kubernetes.io/name: billing-worker
    spec:
      serviceAccountName: billing-worker-sa
      containers:
      - name: billing-worker
        image: ghcr.io/example/billing-worker:1.4.2
        ports:
        - containerPort: 8081
        env:
        - name: TENANT
          value: acme
        - name: ENVIRONMENT
          value: prod
        - name: APP_NAME
          value: billing-worker
        - name: QUEUE_NAME
          value: billing-prod
        resources:
          requests:
            cpu: '500m'
            memory: '1Gi'
          limits:
            cpu: '1000m'
            memory: '2Gi'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: billing-worker
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-worker
  namespace: acme-prod
spec:
  selector:
    app.kubernetes.io/name: billing-worker
  ports:
  - port: 80
    targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billing-worker-ingress
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-worker
  namespace: acme-prod
spec:
  ingressClassName: nginx
  rules:
  - host: worker.acme.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: billing-worker
            port:
              number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: billing-worker-pdb
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: acme
    platform.example.com/environment: prod
    platform.example.com/owner: payments-team
    platform.example.com/cost-center: cc-1001
    app.kubernetes.io/name: billing-worker
  namespace: acme-prod
spec:
  minAvailable: '67%'
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-worker
