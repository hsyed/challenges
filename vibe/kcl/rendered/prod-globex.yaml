apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-ui
  labels:
    app.kubernetes.io/managed-by: kcl
    platform.example.com/tenant: globex
    platform.example.com/environment: prod
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: reporting-ui
  namespace: globex-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: reporting-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: kcl
        platform.example.com/tenant: globex
        platform.example.com/environment: prod
        platform.example.com/owner: analytics-team
        platform.example.com/cost-center: cc-2040
        app.kubernetes.io/name: reporting-ui
    spec:
      serviceAccountName: reporting-ui-sa
      containers:
      - name: reporting-ui
        image: ghcr.io/example/reporting-ui:3.2.0
        ports:
        - containerPort: 3000
        env:
        - name: TENANT
          value: globex
        - name: ENVIRONMENT
          value: prod
        - name: APP_NAME
          value: reporting-ui
        - name: API_BASE_URL
          value: https://analytics.globex.example.com
        resources:
          requests:
            cpu: '500m'
            memory: '512Mi'
          limits:
            cpu: '1000m'
            memory: '1Gi'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
---
