    platform.example.com/tenant: globex
    platform.example.com/environment: prod
    platform.example.com/owner: analytics-team
    platform.example.com/cost-center: cc-2040
    app.kubernetes.io/name: reporting-ui
  namespace: globex-prod
spec:
